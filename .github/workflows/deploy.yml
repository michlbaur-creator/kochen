name: Deploy nach GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Versionsstempel in sw.js setzen
        run: |
          STEMPEL="kochen-shell-${GITHUB_SHA::7}-$(date +%Y%m%d%H%M)"
          sed -i "s/kochen-shell-[A-Za-z0-9-]*/${STEMPEL}/" sw.js
          echo "Version: ${STEMPEL}"
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true
      - name: Zweiter Versuch bei Timeout
        id: deployment2
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4
